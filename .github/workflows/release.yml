name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  detect-platform:
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.check.outputs.linux }}
      windows: ${{ steps.check.outputs.windows }}
      macos: ${{ steps.check.outputs.macos }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect platform from commit message
        id: check
        run: |
          COMMIT_MSG=$(git log --format=%B -n 1)
          echo "Commit message: $COMMIT_MSG"
          
          if echo "$COMMIT_MSG" | grep -q '\bl\b'; then
            echo "linux=true" >> $GITHUB_OUTPUT
          fi
          
          if echo "$COMMIT_MSG" | grep -q '\bw\b'; then
            echo "windows=true" >> $GITHUB_OUTPUT
          fi
          
          if echo "$COMMIT_MSG" | grep -q '\bm\b'; then
            echo "macos=true" >> $GITHUB_OUTPUT
          fi
          
          if echo "$COMMIT_MSG" | grep -q '#go'; then
            echo "linux=true" >> $GITHUB_OUTPUT
            echo "windows=true" >> $GITHUB_OUTPUT
            echo "macos=true" >> $GITHUB_OUTPUT
          fi

  release-linux:
    needs: detect-platform
    if: needs.detect-platform.outputs.linux == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Ubuntu
        run: npm run make -- --platform=linux --arch=x64

      - name: Upload Ubuntu artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-appimage
          path: out/make/**/*.AppImage
          retention-days: 30

  release-windows:
    needs: detect-platform
    if: needs.detect-platform.outputs.windows == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Windows
        run: npm run make -- --platform=win32 --arch=x64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: out/make/**/*.exe
          retention-days: 30

  release-macos:
    needs: detect-platform
    if: needs.detect-platform.outputs.macos == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for macOS Intel (x64)
        run: npm run make -- --platform=darwin --arch=x64

      - name: Build for macOS M-series (arm64)
        run: npm run make -- --platform=darwin --arch=arm64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: out/make/**/*.dmg
          retention-days: 30
